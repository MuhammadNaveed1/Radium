<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Problem</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; font-family:'JetBrains Mono', monospace; }
#pb-container { position:relative; width:100%; height:100%; }
#pb-canvas { display:block; width:100%; height:100%; }
#pb-labels { position:absolute; inset:0; pointer-events:none; }
</style>
</head>
<body>
<div id="pb-container">
  <canvas id="pb-canvas"></canvas>
  <svg id="pb-labels" xmlns="http://www.w3.org/2000/svg"></svg>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const CONFIG = {
  "mode": "problem",
  "camera": {
    "fov": 5,
    "distance": 73.4,
    "tilt": 8,
    "tiltStart": 30,
    "tiltEnd": 8,
    "orbit": 100
  },
  "geometry": {
    "radius": 1.7,
    "thickness": 0.06,
    "gap": 0.65
  },
  "animation": {
    "speed": 0.7
  },
  "labels": {
    "show": true,
    "size": 16,
    "items": [
      "COTS HARDWARE",
      "RADIUM-BUILT",
      "RADIUM-BUILT",
      "RADIUM-BUILT",
      "CUSTOMER-FACING"
    ]
  },
  "background": "#FFFFFF"
};
const PAL={g900:'#242220',blueFace:'#0000CC',blueEdge:'#5A64FF'};
const TH={fop:0.12,eop:0.28,rop:1,rw:0.002};
document.body.style.background=CONFIG.background;
const canvas=document.getElementById('pb-canvas');
const svg=document.getElementById('pb-labels');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setPixelRatio(devicePixelRatio);
const scene=new THREE.Scene();
scene.background=new THREE.Color(CONFIG.background);
scene.add(new THREE.AmbientLight(0xffffff,0.85));
const kl=new THREE.DirectionalLight(0xffffff,0.5);kl.position.set(3,5,4);scene.add(kl);
const camera=new THREE.PerspectiveCamera(CONFIG.camera.fov,1,0.01,1000);
const group=new THREE.Group();scene.add(group);
function resize(){const c=document.getElementById('pb-container');const w=c.clientWidth,h=c.clientHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();svg.setAttribute('width',w);svg.setAttribute('height',h);svg.setAttribute('viewBox','0 0 '+w+' '+h);}
window.addEventListener('resize',resize);resize();
const TWO_PI=Math.PI*2;const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const eio=x=>x<0.5?2*x*x:1-Math.pow(-2*x+2,2)/2;
const eoutSoft=x=>1-Math.pow(1-x,2.2);
function mkMat(col,op){return new THREE.MeshStandardMaterial({color:new THREE.Color(col),roughness:0.6,metalness:0.05,transparent:true,opacity:clamp(op,0,1),side:THREE.DoubleSide,depthWrite:false});}
const G=CONFIG.geometry, labels=CONFIG.labels.items, n=labels.length;
function disc(R,H,faceC,edgeC,ringC,faceOp){
  const rw=Math.max(0.001,Math.min(TH.rw,R*0.08)),eps=rw*1.5;
  const g=new THREE.Group();const fop=faceOp!=null?faceOp:TH.fop;
  const ft=new THREE.CircleGeometry(R,64);ft.rotateX(-Math.PI/2);ft.translate(0,H/2,0);
  const fb=new THREE.CircleGeometry(R,64);fb.rotateX(Math.PI/2);fb.translate(0,-H/2,0);
  g.add(new THREE.Mesh(ft,mkMat(faceC,fop)));g.add(new THREE.Mesh(fb,mkMat(faceC,fop*0.7)));
  g.add(new THREE.Mesh(new THREE.CylinderGeometry(R,R,H,64,1,true),mkMat(edgeC,TH.eop)));
  [H/2+eps,-H/2-eps].forEach(ry=>{const ring=new THREE.TorusGeometry(R,rw,8,64);ring.rotateX(Math.PI/2);ring.translate(0,ry,0);g.add(new THREE.Mesh(ring,mkMat(ringC,TH.rop)));});
  return g;
}
function buildAt(scales){
  while(group.children.length)group.remove(group.children[0]);
  const stepH=Math.max(0.001,G.thickness+G.gap);
  const totalH=(n-1)*stepH+G.thickness,startY=-totalH/2;
  labels.forEach((_,i)=>{
    const p=Math.max(0.001,scales?scales[i]:1);const R=G.radius*p;
    const isBottom=(i===0);
    const fC=isBottom?PAL.g900:PAL.blueFace;const eC=isBottom?PAL.g900:PAL.blueEdge;
    const fOp=isBottom?TH.fop*0.15:TH.fop;
    const d=disc(R,G.thickness,fC,eC,PAL.g900,fOp);
    d.position.y=startY+i*stepH;d.userData.idx=i;group.add(d);
  });
}
let curTilt=CONFIG.camera.tilt;
const anim={active:false,t:0};
let _mx=0,_my=0,_sx=0,_sy=0;const _TR=4;
document.addEventListener('mousemove',e=>{_mx=((e.clientX/window.innerWidth)-0.5)*2;_my=((e.clientY/window.innerHeight)-0.5)*2;});
function updateCam(){
  const sm=0.08;_sx+=(_mx-_sx)*sm;_sy+=(_my-_sy)*sm;
  const tr=curTilt*Math.PI/180+_sy*_TR*Math.PI/180;
  const or=CONFIG.camera.orbit*Math.PI/180+_sx*_TR*Math.PI/180;
  camera.position.set(Math.sin(or)*Math.cos(tr)*CONFIG.camera.distance,Math.sin(tr)*CONFIG.camera.distance,Math.cos(or)*Math.cos(tr)*CONFIG.camera.distance);
  camera.lookAt(0,0,0);camera.updateProjectionMatrix();
}
function animTotal(){return n*0.55+0.5;}
function tick(dt){
  if(!anim.active)return;
  const total=animTotal();anim.t=Math.min(total,anim.t+dt*CONFIG.animation.speed);
  const scales=labels.map((_,i)=>Math.max(0.001,eio(clamp(anim.t-i*0.4,0,1))));
  buildAt(scales);
  curTilt=CONFIG.camera.tiltStart+(CONFIG.camera.tiltEnd-CONFIG.camera.tiltStart)*eoutSoft(clamp(anim.t/total,0,1));
  scene.updateMatrixWorld(true);drawLabels();
  if(anim.t>=total)anim.active=false;
}
function project(v3){const c=v3.clone().project(camera);const w=renderer.domElement.clientWidth,h=renderer.domElement.clientHeight;return{x:(c.x*0.5+0.5)*w,y:(-c.y*0.5+0.5)*h,behind:c.z>=1};}
function drawLabels(){
  svg.innerHTML='';if(!CONFIG.labels.show)return;
  group.children.forEach(grp=>{
    const i=grp.userData.idx;if(i===undefined)return;
    const scale=grp.children.length>0?clamp(grp.children[0].parent.scale.x||1,0,1):1;
    const discR=G.radius*(anim.active?eio(clamp(anim.t-i*0.4,0,1)):1);
    const fade=clamp((discR/G.radius-0.3)/0.7,0,1);
    if(fade<0.02)return;
    const pt=new THREE.Vector3(0,G.thickness/2+0.01,0).applyMatrix4(grp.matrixWorld);
    const p=project(pt);if(p.behind)return;
    const lines=labels[i].split('\n'),lh=CONFIG.labels.size*1.3;
    lines.forEach((ln,li)=>{
      const t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x',p.x);t.setAttribute('y',p.y+CONFIG.labels.size*0.36+4-(lines.length-1-li)*lh);
      t.setAttribute('fill',PAL.g900);t.setAttribute('font-family','JetBrains Mono, monospace');
      t.setAttribute('font-size',CONFIG.labels.size);t.setAttribute('font-weight','500');
      t.setAttribute('letter-spacing','0.06em');t.setAttribute('text-anchor','middle');
      t.setAttribute('opacity',fade.toFixed(3));
      t.textContent=ln;svg.appendChild(t);
    });
  });
}
let hasStarted=false;
window.problemPlay=function(){anim.t=0;anim.active=true;hasStarted=true;curTilt=CONFIG.camera.tiltStart;buildAt(labels.map(()=>0.001));};
const reduced=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if(reduced){buildAt(null);scene.updateMatrixWorld(true);drawLabels();}
else{buildAt(labels.map(()=>0.001));let hp=false;const io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting&&!hp){hp=true;window.problemPlay();}});},{threshold:0.3});io.observe(document.getElementById('pb-container'));}
let lastT=performance.now();
function loop(){requestAnimationFrame(loop);const now=performance.now(),dt=Math.min(0.1,(now-lastT)/1000);lastT=now;tick(dt);updateCam();renderer.render(scene,camera);if(!anim.active&&hasStarted)drawLabels();}
loop();
</script>
</body>
</html>
